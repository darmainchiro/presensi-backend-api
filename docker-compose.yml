version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres_db_container
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: presensi_db
    volumes:
      - pg_data:/var/lib/postgresql/data

  api-backend:
    build: .
    container_name: presensi_api_container
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db
    environment:
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=presensi_db

volumes:
  pg_data: